<!DOCTYPE html><html lang='es'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Acestream STP98</title><link rel="icon" type="image/png" href="logo.png"><style>body{margin:0;background:#111;color:#fff;font-family:Arial}header{background:#222;padding:15px;text-align:center;font-size:24px}#grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:10px}a.card{text-decoration:none;color:#fff;background:#1f1f1f;border-radius:10px;overflow:hidden}img{width:100%;height:110px;object-fit:contain;background:#fff}p{margin:0;padding:8px;text-align:center;font-size:14px}</style></head><body><header>Acestream STP98</header>
<div style="display:flex;justify-content:flex-start;padding:10px;background:#222;">

<span id="lupa" style="
font-size:28px;
cursor:pointer;
margin-left:10px;
user-select:none;
">🔍</span>

</div>

<input
id="buscar"
type="text"
placeholder="Buscar canal..."
style="
display:none;
width:calc(100% - 20px);
margin:10px;
padding:12px;
font-size:16px;
border:none;
border-radius:10px;
outline:none;
"><div id='grid'>Cargando...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
    getFirestore,
    doc,
    getDoc,
    setDoc,
    updateDoc
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBcFtDgrhHjRPqyZd2rUmVuCUzid9MOtHc",
    authDomain: "acestream-stp98.firebaseapp.com",
    projectId: "acestream-stp98",
    storageBucket: "acestream-stp98.firebasestorage.app",
    messagingSenderId: "134341062845",
    appId: "1:134341062845:web:e14704c6ab243ae01707d4",
    measurementId: "G-40NEPQLVJJ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function iniciar() {

    let deviceId = localStorage.getItem("deviceId");

    if (!deviceId) {
        deviceId = crypto.randomUUID();
        localStorage.setItem("deviceId", deviceId);
    }

    const dispositivoRef = doc(db, "devices", deviceId);

    const dispositivo = await getDoc(dispositivoRef);

    // NUEVO DISPOSITIVO
    if (!dispositivo.exists()) {

        document.body.innerHTML = `
        <div style="
            background:#111;
            color:white;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial;
        ">
            <div style="text-align:center;width:320px;">
                <h2>🔒 Solicitar acceso</h2>

                <input
                    id="nombre"
                    placeholder="Introduce tu nombre"
                    style="
                        width:100%;
                        padding:12px;
                        font-size:18px;
                        border-radius:10px;
                        border:none;
                        margin-top:20px;
                    ">

                <button
                    id="solicitar"
                    style="
                        margin-top:20px;
                        width:100%;
                        padding:12px;
                        font-size:18px;
                        border:none;
                        border-radius:10px;
                        cursor:pointer;
                    ">
                    Solicitar acceso
                </button>
            </div>
        </div>
        `;

        document.getElementById("solicitar").onclick = async () => {

            const nombre = document.getElementById("nombre").value.trim();

            if (nombre === "") {
                alert("Introduce tu nombre.");
                return;
            }

            const ahora = new Date().toISOString();

            await setDoc(dispositivoRef, {
                nombre: nombre,
                permitido: false,
                fechaSolicitud: ahora,
                fechaAprobacion: null,
                ultimaConexion: ahora
            });

            location.reload();

        };

        return;
    }

    const datos = dispositivo.data();

    await updateDoc(dispositivoRef, {
        ultimaConexion: new Date().toISOString()
    });

    if (datos.permitido && !datos.fechaAprobacion) {

        await updateDoc(dispositivoRef, {
            fechaAprobacion: new Date().toISOString()
        });

    }

    window.usuarioAutorizado = datos.permitido === true;

    window.dispatchEvent(new Event("firebase-ready"));

}

iniciar().catch(console.error);

</script>
    
<script>

let tarjetas = [];

const lupa = document.getElementById("lupa");
const buscar = document.getElementById("buscar");
const grid = document.getElementById("grid");

window.addEventListener("firebase-ready", () => {

    // Si no está autorizado, mostrar mensaje
    if (!window.usuarioAutorizado) {

        grid.innerHTML = `
            <div style="
                display:flex;
                justify-content:center;
                align-items:center;
                height:60vh;
                font-size:28px;
                color:white;
                text-align:center;
                font-family:Arial;
            ">
                🔒<br>Esperant aprovació...
            </div>
        `;

        return;
    }

    // Cargar canales
    fetch('https://opensheet.elk.sh/10eWMMZKgZgag_qlV4MBD-pPz5PRL24NVnJAZliREAWs/1')
    .then(r => r.json())
    .then(d => {

        grid.innerHTML = "";

        d.forEach(c => {

            if (!c["LINK ACESTREAM"]) return;

            let a = document.createElement("a");
            a.className = "card";
            a.href = c["LINK ACESTREAM"];

            let i = document.createElement("img");
            i.src = c.IMATGE || "";
            i.onerror = function () {
                this.src = "logo.png";
            };

            let p = document.createElement("p");
            p.textContent = c.CANAL || "";

            a.appendChild(i);
            a.appendChild(p);

            tarjetas.push({
                nombre: (c.CANAL || "").toUpperCase(),
                elemento: a
            });

            grid.appendChild(a);

        });

    })
    .catch(() => {
        grid.innerHTML = "Error cargando datos";
    });

});

lupa.onclick = function () {

    if (buscar.style.display === "none") {

        buscar.style.display = "block";
        buscar.focus();

    } else {

        buscar.style.display = "none";
        buscar.value = "";

        tarjetas.forEach(t => {
            t.elemento.style.display = "";
        });

    }

};

buscar.addEventListener("input", function () {

    let texto = this.value.toUpperCase().trim();

    tarjetas.forEach(t => {

        if (t.nombre.includes(texto)) {
            t.elemento.style.display = "";
        } else {
            t.elemento.style.display = "none";
        }

    });

});

</script>
