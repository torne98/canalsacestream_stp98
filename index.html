<!DOCTYPE html><html lang='es'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Canales</title><style>body{margin:0;background:#111;color:#fff;font-family:Arial}header{background:#222;padding:15px;text-align:center;font-size:24px}#grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:10px}a.card{text-decoration:none;color:#fff;background:#1f1f1f;border-radius:10px;overflow:hidden}img{width:100%;height:110px;object-fit:contain;background:#fff}p{margin:0;padding:8px;text-align:center;font-size:14px}</style></head><body><header>Canals AceStream</header>
<div style="display:flex;justify-content:flex-start;padding:10px;background:#222;">

<span id="lupa" style="
font-size:28px;
cursor:pointer;
margin-left:10px;
user-select:none;
">🔍</span>

</div>

<input
id="buscar"
type="text"
placeholder="Buscar canal..."
style="
display:none;
width:calc(100% - 20px);
margin:10px;
padding:12px;
font-size:16px;
border:none;
border-radius:10px;
outline:none;
"><div id='grid'>Cargando...</div>

<script>

fetch('https://opensheet.elk.sh/10eWMMZKgZgag_qlV4MBD-pPz5PRL24NVnJAZliREAWs/1')
.then(r=>r.json())
.then(d=>{

let g=document.getElementById('grid');

g.innerHTML='';

d.forEach(c=>{

if(!c['LINK ACESTREAM']) return;

let a=document.createElement('a');
a.className='card';
a.href=c['LINK ACESTREAM'];

let i=document.createElement('img');
i.src=c.IMATGE||'';
i.onerror=()=>i.src='https://via.placeholder.com/150?text=Logo';

let p=document.createElement('p');
p.textContent=c.CANAL||'';

a.append(i,p);
g.appendChild(a);

});

})
.catch(()=>document.getElementById('grid').innerHTML='Error cargando datos');

const lupa=document.getElementById("lupa");
const buscar=document.getElementById("buscar");

lupa.onclick=function(){

if(buscar.style.display==="none"){

buscar.style.display="block";
buscar.focus();

}else{

buscar.style.display="none";
buscar.value="";

}

}

</script>
