<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
    getFirestore,
    doc,
    getDoc,
    setDoc,
    updateDoc
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBcFtDgrhHjRPqyZd2rUmVuCUzid9MOtHc",
    authDomain: "acestream-stp98.firebaseapp.com",
    projectId: "acestream-stp98",
    storageBucket: "acestream-stp98.firebasestorage.app",
    messagingSenderId: "134341062845",
    appId: "1:134341062845:web:e14704c6ab243ae01707d4",
    measurementId: "G-40NEPQLVJJ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function fechaHora() {

    const d = new Date();

    const año = d.getFullYear();
    const mes = String(d.getMonth() + 1).padStart(2, "0");
    const dia = String(d.getDate()).padStart(2, "0");

    const hora = String(d.getHours()).padStart(2, "0");
    const minuto = String(d.getMinutes()).padStart(2, "0");
    const segundo = String(d.getSeconds()).padStart(2, "0");

    return `${año}-${mes}-${dia} ${hora}:${minuto}:${segundo}`;
}
    
async function iniciar() {

    // Obtener o crear ID del dispositivo
    let deviceId = localStorage.getItem("deviceId");

    if (!deviceId) {
        deviceId = crypto.randomUUID();
        localStorage.setItem("deviceId", deviceId);
    }

    const dispositivoRef = doc(db, "devices", deviceId);

    const dispositivo = await getDoc(dispositivoRef);

    // NUEVO DISPOSITIVO
    if (!dispositivo.exists()) {

        document.body.innerHTML = `
        <div style="
            background:#111;
            color:white;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial;
        ">
            <div style="
                width:340px;
                text-align:center;
            ">

                <h2>🔒 Sol·licitar accés</h2>

                <input
                    id="nombre"
                    placeholder="Nom"
                    style="
                        width:100%;
                        padding:12px;
                        font-size:18px;
                        border:none;
                        border-radius:10px;
                        margin-top:20px;
                        box-sizing:border-box;
                    ">

                <button
                    id="solicitar"
                    style="
                        width:100%;
                        margin-top:20px;
                        padding:12px;
                        font-size:18px;
                        border:none;
                        border-radius:10px;
                        cursor:pointer;
                    ">
                    Sol·licitar
                </button>

            </div>
        </div>
        `;

        document.getElementById("solicitar").onclick = async () => {

            const nombre = document.getElementById("nombre").value.trim();

            if (!nombre) {
                alert("Nom:");
                return;
            }

            const ahora = fechaHora();

            await setDoc(dispositivoRef, {
                nombre: nombre,
                permitido: false,
                fechaSolicitud: ahora,
                fechaAprobacion: null,
                ultimaConexion: ahora
            });

            document.body.innerHTML = `
            <div style="
                background:#111;
                color:white;
                height:100vh;
                display:flex;
                justify-content:center;
                align-items:center;
                font-family:Arial;
                text-align:center;
                padding:20px;
            ">
                <div>
                    <h2>🔒 Esperant autorització</h2>
                    <p>Sol·licitud registrada.</p>
                </div>
            </div>
            `;

        };

        return;
    }

    // YA EXISTE
    const datos = dispositivo.data();

    // Actualizar última conexión
    await updateDoc(dispositivoRef, {
        ultimaConexion: fechaHora()
    });

    // Guardar fecha de aprobación la primera vez
    if (datos.permitido && !datos.fechaAprobacion) {

        await updateDoc(dispositivoRef, {
            fechaAprobacion: fechaHora()
        });

    }

    // Usuario aprobado
    if (datos.permitido) {

        window.usuarioAutorizado = true;
        window.dispatchEvent(new Event("firebase-ready"));

    } else {

        // Pendiente de aprobación
        document.body.innerHTML = `
        <div style="
            background:#111;
            color:white;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial;
            text-align:center;
            padding:20px;
        ">
            <div>
                <h2>🔒 Esperant autorització</h2>
                <p>Sol·licitud registrada.</p>
            </div>
        </div>
        `;

    }

}

iniciar().catch(console.error);

</script>
    
<script>

let tarjetas = [];

const lupa = document.getElementById("lupa");
const buscar = document.getElementById("buscar");
const grid = document.getElementById("grid");

window.addEventListener("firebase-ready", () => {
    // Si no está autorizado, mostrar mensaje
    if (!window.usuarioAutorizado) {

        grid.innerHTML = `
            <div style="
                display:flex;
                justify-content:center;
                align-items:center;
                height:60vh;
                font-size:28px;
                color:white;
                text-align:center;
                font-family:Arial;
            ">
                🔒<br>Esperant aprovació...
            </div>
        `;

        return;
    }

    // Cargar canales
    async function cargarCanales(intento = 1) {

    try {

        const r = await fetch("https://opensheet.elk.sh/error");

        if (!r.ok) throw new Error();

        const d = await r.json();

        tarjetas = [];
        grid.innerHTML = "";

        d.forEach(c => {

            if (!c["LINK ACESTREAM"]) return;

            let a = document.createElement("a");
            a.className = "card";
            a.href = c["LINK ACESTREAM"];
            a.target = "_self";

            let i = document.createElement("img");
            i.loading = "lazy";
            i.src = c.IMATGE || "";

            i.onerror = function () {
                this.src = "logo.png";
            };

            let p = document.createElement("p");
            p.textContent = c.CANAL || "";

            a.appendChild(i);
            a.appendChild(p);

            tarjetas.push({
                nombre: (c.CANAL || "").toUpperCase(),
                elemento: a
            });

            grid.appendChild(a);

        });

    } catch {

     if (intento < 15) {

    grid.innerHTML = `
    <div style="
        display:flex;
        justify-content:center;
        align-items:flex-start;
        width:100%;
        padding-top:25px;
        color:white;
        font-size:20px;
        font-family:Arial;
        white-space:nowrap;
    ">
        Problemes en el servidor, intentant recarregar canals...
    </div>
`;

            setTimeout(() => {
                cargarCanales(intento + 1);
            }, 2000);

 } else {

       grid.innerHTML = `
    <div style="
        display:flex;
        justify-content:center;
        align-items:flex-start;
        width:100%;
        padding-top:25px;
        color:white;
        font-size:20px;
        font-family:Arial;
        white-space:nowrap;
    ">
        Error en el servidor.
    </div>
`;

        }

    }

}   

cargarCanales();

});

lupa.onclick = function () {

    if (buscar.style.display === "none") {

        buscar.style.display = "block";
        buscar.focus();

    } else {

        buscar.style.display = "none";
        buscar.value = "";

        tarjetas.forEach(t => {
            t.elemento.style.display = "";
        });

    }

};

buscar.addEventListener("input", function () {

    let texto = this.value.toUpperCase().trim();

    tarjetas.forEach(t => {

        if (t.nombre.includes(texto)) {
            t.elemento.style.display = "";
        } else {
            t.elemento.style.display = "none";
        }

    });

});

</script>
